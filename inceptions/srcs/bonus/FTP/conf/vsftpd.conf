listen=YES
listen_ipv6=NO

anonymous_enable=NO

local_enable=YES
write_enable=YES

local_umask=022

dirmessage_enable=YES
use_localtime=YES

xferlog_enable=YES

connect_from_port_20=YES

secure_chroot_dir=/var/run/vsftpd/empty

chroot_local_user=YES
allow_writeable_chroot=YES

local_root=/var/www/html

pasv_enable=YES
pasv_addr_resolve=NO
pasv_address=PASV_ADDRESS
# pasv_min_port=30000
# pasv_max_port=30009