services:
  nginx:
    build: ./requirement/nginx
    container_name: srcs-nginx
    restart: always
    ports:
       - "443:443"
    depends_on:
      - wordpress
    
    volumes:
      - wordpress_data:/var/www/html 
    networks:
      - inception

  wordpress:
    build: ./requirement/wordpress
    container_name: srcs-wordpress
    restart: always
    depends_on:
      - mariadb
    # add healthcheck for wordpress container
    # healthcheck:
    #   test: ["", "sr"]
    #   interval: 30s
    #   timeout: 1m
    #   retries: 10
    #   start_period: 10s
    
    expose:
      - "9000"
    environment:
      MYSQL_HOST: ${MYSQL_HOST}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}

      DOMAIN_NAME: ${DOMAIN_NAME}

      WP_TITLE: ${WP_TITLE}

      WP_ADMIN_USER: ${WP_ADMIN_USER}
      WP_ADMIN_PASSWORD: ${WP_ADMIN_PASSWORD}
      WP_ADMIN_EMAIL: ${WP_ADMIN_EMAIL}

      WP_USER: ${WP_USER}
      WP_USER_PASSWORD: ${WP_USER_PASSWORD}
      WP_USER_EMAIL: ${WP_USER_EMAIL}

     
    volumes:
      - wordpress_data:/var/www/html
    networks:
      - inception

  mariadb:
    build: ./requirement/mariadb
    container_name: srcs-mariadb
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    # healthcheck:
    #   test: ["ping", "srcs-mariadb"]
    #   interval: 30s
    #   timeout: 1m
    #   retries: 10
    #   start_period: 10s
    volumes:
      - mariadb_data:/var/lib/mysql 
    networks:
      - inception
  redis:                                  ## redis
    build: ./bonus/redis
    container_name: redis
    image: redis
    restart: unless-stopped
    expose:
      - "6379"                         
    networks:
      - inception
    
  static: 
    build: ./bonus/static
    container_name: static-site
    networks: 
      - inception
    restart: always

  portainer:
    build: ./bonus/portainer
    container_name: portainer
    restart: always
    ports:
      - "9443:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - inception
volumes:
  wordpress_data:
    name: wordpress_data
  portainer_data:
    name: portainer_data
  mariadb_data:
    name: mariadb_data

networks:
  inception:
    driver: bridge