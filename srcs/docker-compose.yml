services:
  nginx:
    build: ./requirement/nginx
    image: srcs-nginx-run
    container_name: srcs-nginx
    restart: always
    ports:
      - "443:443"
    depends_on:
      - wordpress
    volumes:
      - wordpress_data:/var/www/html
    networks:
      - inception

  wordpress:
    build: ./requirement/wordpress
    image: srcs-wordpress-run
    container_name: srcs-wordpress
    restart: always
    depends_on:
      - mariadb
    expose:
      - "9000"

    environment:
      MYSQL_HOST: ${MYSQL_HOST}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}

      DOMAIN_NAME: ${DOMAIN_NAME}

      WP_TITLE: ${WP_TITLE}

      WP_ADMIN_USER: ${WP_ADMIN_USER}
      WP_ADMIN_PASSWORD: ${WP_ADMIN_PASSWORD}
      WP_ADMIN_EMAIL: ${WP_ADMIN_EMAIL}

      WP_USER: ${WP_USER}
      WP_USER_PASSWORD: ${WP_USER_PASSWORD}
      WP_USER_EMAIL: ${WP_USER_EMAIL}

    secrets:
      - mysql_user_password
      - wp_admin_password

    volumes:
      - wordpress_data:/var/www/html

    networks:
      - inception

  mariadb:
    build: ./requirement/mariadb
    image: srcs-mariadb-run
    container_name: srcs-mariadb
    restart: always

    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}

    secrets:
      - mysql_root_password
      - mysql_user_password

    volumes:
      - mariadb_data:/var/lib/mysql

    networks:
      - inception

  redis:
    build: ./bonus/redis
    image: srcs-redis-run
    container_name: srcs-redis
    restart: unless-stopped
    expose:
      - "6379"
    networks:
      - inception

  static:
    build: ./bonus/static
    image: srcs-static-run
    container_name: srcs-static
    restart: always
    networks:
      - inception

  ftp:
    build: ./bonus/FTP
    image: srcs-ftp-run
    container_name: srcs-ftp
    restart: unless-stopped

    environment:
      FTP_USER: ${FTP_USER}
      FTP_PASV_ADDRESS: ${FTP_PASV_ADDRESS}
    secrets:
      - ftp_password

    volumes:
      - wordpress_data:/var/www/html

    ports:
      - "21:21"
      - "30000-30009:30000-30009"

    networks:
      - inception

  adminer:
    build: ./bonus/Adminer
    image: srcs-adminer-run
    container_name: srcs-adminer
    restart: always
    ports:
      - "8888:8888"
    networks:
      - inception

  portainer:
    build: ./bonus/portainer
    image: srcs-portainer-run
    container_name: srcs-portainer
    restart: always
    ports:
      - "9443:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - inception

volumes:
  wordpress_data:
    name: wordpress_data
  mariadb_data:
    name: mariadb_data
  portainer_data:
    name: portainer_data

networks:
  inception:
    driver: bridge

secrets:
  mysql_root_password:
    environment: MYSQL_ROOT_PASSWORD
  mysql_user_password:
    environment: MYSQL_PASSWORD
  ftp_password:
    environment: FTP_PASSWORD
  wp_admin_password:
    environment: WP_ADMIN_PASSWORD